<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title> Darkost's player </title>
  <link rel="icon" type="image/png" href="assets/favicon.ico" />
  <link rel="stylesheet" href="styles/style.css" />

  <script language="javascript" type="text/javascript"
    src="https://sdk.amazonaws.com/js/aws-sdk-2.1430.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="scripts/config.js"></script>
  <script src="scripts/.local.config.js"></script>
  <script src="scripts/assets.js"></script>
  <script defer src="scripts/player.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400&display=block" rel="stylesheet">
</head>

<body>
  <div class="overlay">
    <img class="load-spinner" src="assets/loading.png" />
  </div>
  <div class="top-controls">
    <button type="button" class="button no-select toggle-lyrics-button" onclick="toggleLyrics()">
      <img src="assets/text.png" class="no-select toggle-lyrics-icon" />
    </button>
    <button type="button" class="button no-select toggle-bars-button" onclick="toggleBars()">
      <img src="assets/bars.png" class="no-select toggle-bars-icon" />
    </button>
    <button type="button" class="button no-select toggle-queue-button" onclick="toggleQueue()">
      <img src="assets/queue.png" class="no-select toggle-queue-icon" />
    </button>
  </div>
  <div class="content">
    <div class="chart">
      <canvas class="canvas"> </canvas>
    </div>
    <section class="equalizer">
      <div>
        <audio class="audio" preload="metadata" crossorigin="anonymous" />
      </div>
    </section>

  </div>
  <div class="lyrics-panel">
    <div class="lyrics-content">
      <p class="lyrics-text"></p>
    </div>
  </div>
  <div class="queue-panel">
    <div class="queue-content">
      <input type="text" class="queue-search" placeholder="Search…" autocomplete="off" spellcheck="false" />
      <div class="queue-list"></div>
    </div>
  </div>
  <div class="footing-span">
    <div class="name-holder">
      <p class="song-name">Name of song</p>
    </div>
    <div class="status-string">
      <div class="volume-settings">
        <img src="assets/volume.png" class="no-select volume-button" />
        <input type="range" min="0" max="1" value="0.5" step="0.01" class="volume-regulator">
      </div>
      <div class="slider-container">
        <input type="range" min="1" max="100" value="1" class="progress">
      </div>
      <div class="current-time"> --:-- </div>
    </div>
    <footer>
      <nav>
        <div class="no-select control-panel">
          <button type="button" class="button no-select previous" onclick="previousSong()">
            <img src="assets/previous.png" class="button-icon previous-button no-select" />
          </button>
          <button type="button" class="button no-select toggle" onclick="toggleMusic()">
            <img src="assets/play.png" class="button-icon toggle-button no-select" />
          </button>
          <button type="button" class="button no-select next" onclick="nextSong()">
            <img src="assets/next.png" class="button-icon next-button no-select" />
          </button>
        </div>
      </nav>
      <div class="footer-side--right">
        <button type="button" class="button no-select shuffle-button" onclick="shufflePlaylist()">
          <img src="assets/shuffle.png" class="no-select shuffle-icon" />
        </button>
      </div>
    </footer>
  </div>
</body>
